name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # gostcrypto is wired in by `replace ../gostcrypto`, so it must be
      # checked out as a sibling directory next to this module.
      - uses: actions/checkout@v4
        with:
          path: gostcrypto-compat
      - uses: actions/checkout@v4
        with:
          repository: bigbes/gostcrypto
          path: gostcrypto
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: build
        working-directory: gostcrypto-compat
        run: go build ./...

      # Parity (./parity/...) and the live gost-engine differential are disabled
      # here: they build against the bigbes/gostcrypto default branch, so they go
      # red whenever a gostcrypto API change lands on a branch before it merges to
      # master. Those suites are gated by gostcrypto's own `parity` workflow, which
      # tests each PR against the matching gostcrypto tree. This job keeps the
      # facade KAT/vector tests (the module root package).
      - name: test (facade KAT/vector)
        working-directory: gostcrypto-compat
        run: go test .
